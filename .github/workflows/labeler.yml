name: Pull Request Labeler
on:
  - pull_request_target

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  triage:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"

